# ==============================================================================
# Vox-SN — Infrastructure Big Data Temps Réel
# ==============================================================================
# Stack : NiFi → Kafka → Spark NLP → HBase/Hive → Airflow + MLflow
#
# Démarrage :  docker compose up -d
# Arrêt    :  docker compose down
# Logs     :  docker compose logs -f <service>
# ==============================================================================

version: '3.8'

services:

  # ============================================================================
  # 1. ZOOKEEPER — Coordination Kafka
  # ============================================================================
  zookeeper:
    image: bitnami/zookeeper:3.8
    container_name: vox_zookeeper
    restart: unless-stopped
    environment:
      ALLOW_ANONYMOUS_LOGIN: "yes"
      ZOO_LOG_LEVEL: "WARN"
    ports:
      - "2181:2181"
    volumes:
      - zk_data:/bitnami/zookeeper
    networks: [vox_sn_net]
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================================
  # 2. KAFKA — Message Broker temps réel
  # ============================================================================
  kafka:
    image: bitnami/kafka:3.3
    container_name: vox_kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_CFG_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,EXTERNAL://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9093
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      ALLOW_PLAINTEXT_LISTENER: "yes"
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_NUM_PARTITIONS: "3"
      KAFKA_CFG_DEFAULT_REPLICATION_FACTOR: "1"
    volumes:
      - kafka_data:/bitnami/kafka
    networks: [vox_sn_net]

  # ============================================================================
  # 3. KAFKA UI — Interface web pour Kafka (démo / debug)
  # ============================================================================
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: vox_kafka_ui
    restart: unless-stopped
    depends_on: [kafka]
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: vox-sn-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks: [vox_sn_net]

  # ============================================================================
  # 4. NIFI — Ingestion multi-canaux
  # ============================================================================
  nifi:
    image: apache/nifi:1.23.2
    container_name: vox_nifi
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      NIFI_WEB_HTTP_PORT: "8080"
      NIFI_CLUSTER_IS_NODE: "false"
      SINGLE_USER_CREDENTIALS_USERNAME: admin
      SINGLE_USER_CREDENTIALS_PASSWORD: voxsnadminpwd2025
    volumes:
      - ./nifi/templates:/opt/nifi/nifi-current/conf/templates
      - ./data/posts:/opt/nifi/data/posts
      - nifi_data:/opt/nifi/nifi-current/data
    networks: [vox_sn_net]

  # ============================================================================
  # 5. SPARK MASTER — NLP Pipeline
  # ============================================================================
  spark-master:
    image: bitnami/spark:3.3
    container_name: vox_spark_master
    restart: unless-stopped
    environment:
      SPARK_MODE: master
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"
      CITIZEN_SECRET_SALT: ${CITIZEN_SECRET_SALT:-UADB_VOX_2025}
      PYSPARK_PYTHON: python3
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ./spark:/opt/spark-apps
      - ./models:/opt/models
      - ./data:/opt/data
    networks: [vox_sn_net]

  # ============================================================================
  # 6. SPARK WORKER
  # ============================================================================
  spark-worker:
    image: bitnami/spark:3.3
    container_name: vox_spark_worker
    restart: unless-stopped
    depends_on: [spark-master]
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2
      CITIZEN_SECRET_SALT: ${CITIZEN_SECRET_SALT:-UADB_VOX_2025}
    volumes:
      - ./spark:/opt/spark-apps
      - ./models:/opt/models
      - ./data:/opt/data
    networks: [vox_sn_net]

  # ============================================================================
  # 7. HBASE — Stockage temps réel (alertes & posts)
  # ============================================================================
  hbase:
    image: harisekhon/hbase:2.1
    container_name: vox_hbase
    restart: unless-stopped
    hostname: hbase
    ports:
      - "16010:16010"
      - "9090:9090"
      - "2182:2181"
    environment:
      HBASE_CONF_hbase_master_info_port: "16010"
    volumes:
      - hbase_data:/hbase-data
    networks: [vox_sn_net]

  # ============================================================================
  # 8. HIVE METASTORE
  # ============================================================================
  hive-metastore:
    image: apache/hive:3.1.3
    container_name: vox_hive_metastore
    restart: unless-stopped
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: derby
    ports:
      - "9083:9083"
    volumes:
      - hive_data:/opt/hive/data/warehouse
    networks: [vox_sn_net]

  # ============================================================================
  # 9. HIVE SERVER 2 — Endpoint Beeline / JDBC
  # ============================================================================
  hive-server:
    image: apache/hive:3.1.3
    container_name: vox_hive_server
    restart: unless-stopped
    depends_on: [hive-metastore]
    environment:
      SERVICE_NAME: hiveserver2
      SERVICE_OPTS: "-Dhive.metastore.uris=thrift://hive-metastore:9083"
      IS_RESUME: "true"
    ports:
      - "10000:10000"
      - "10002:10002"
    networks: [vox_sn_net]

  # ============================================================================
  # 10. AIRFLOW — Orchestration MLOps
  # ============================================================================
  airflow:
    image: apache/airflow:2.7.3-python3.9
    container_name: vox_airflow
    restart: unless-stopped
    ports:
      - "8082:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      _AIRFLOW_DB_UPGRADE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_USER:-admin}
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_PWD:-admin}
    volumes:
      - ./dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./models:/opt/airflow/models
      - ./spark:/opt/airflow/spark
    networks: [vox_sn_net]
    command: standalone

  # ============================================================================
  # 11. MLFLOW — Tracking des expérimentations
  # ============================================================================
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.8.1
    container_name: vox_mlflow
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
    networks: [vox_sn_net]

# ------------------------------------------------------------------------------
# Volumes persistants
# ------------------------------------------------------------------------------
volumes:
  zk_data:        {driver: local}
  kafka_data:     {driver: local}
  nifi_data:      {driver: local}
  hbase_data:     {driver: local}
  hive_data:      {driver: local}
  mlflow_data:    {driver: local}

# ------------------------------------------------------------------------------
# Réseau isolé
# ------------------------------------------------------------------------------
networks:
  vox_sn_net:
    driver: bridge
    name: vox_sn_net
