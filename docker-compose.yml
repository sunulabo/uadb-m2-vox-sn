# ==============================================================================
# Vox-SN — Infrastructure Big Data Temps Réel
# ==============================================================================
# Stack : NiFi → Kafka → Spark NLP → HBase/Hive → Airflow + MLflow
#
# Démarrage :  docker compose up -d
# Arrêt    :  docker compose down
# Logs     :  docker compose logs -f <service>
# ==============================================================================

version: '3.8'

services:

  # ============================================================================
  # 1. ZOOKEEPER — Coordination Kafka
  # ============================================================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: vox_zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_LOG4J_ROOT_LOGLEVEL: WARN
    ports:
      - "2181:2181"
    volumes:
      - zk_data:/var/lib/zookeeper/data
      - zk_log:/var/lib/zookeeper/log
    networks: [vox_sn_net]
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================================
  # 2. KAFKA — Message Broker temps réel
  # ============================================================================
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: vox_kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,EXTERNAL://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks: [vox_sn_net]

  # ============================================================================
  # 3. KAFKA UI — Interface web pour Kafka (démo / debug)
  # ============================================================================
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: vox_kafka_ui
    restart: unless-stopped
    depends_on: [kafka]
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: vox-sn-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks: [vox_sn_net]

  # ============================================================================
  # 4. NIFI — Ingestion multi-canaux
  # ============================================================================
  nifi:
    image: apache/nifi:1.23.2
    container_name: vox_nifi
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      NIFI_WEB_HTTP_PORT: "8080"
      NIFI_CLUSTER_IS_NODE: "false"
      SINGLE_USER_CREDENTIALS_USERNAME: admin
      SINGLE_USER_CREDENTIALS_PASSWORD: voxsnadminpwd2025
    volumes:
      - ./nifi/templates:/opt/nifi/nifi-current/conf/templates
      - ./data/posts:/opt/nifi/data/posts
      - nifi_data:/opt/nifi/nifi-current/data
    networks: [vox_sn_net]

  # ============================================================================
  # 5. SPARK MASTER — NLP Pipeline
  # ============================================================================
  spark-master:
    image: apache/spark:3.5.0
    container_name: vox_spark_master
    user: root
    restart: unless-stopped
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    environment:
      SPARK_NO_DAEMONIZE: "true"
      CITIZEN_SECRET_SALT: ${CITIZEN_SECRET_SALT:-UADB_VOX_2025}
      PYSPARK_PYTHON: python3
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ./spark:/opt/spark-apps
      - ./models:/opt/models
      - ./data:/opt/data
    networks: [vox_sn_net]

  # ============================================================================
  # 6. SPARK WORKER
  # ============================================================================
  spark-worker:
    image: apache/spark:3.5.0
    container_name: vox_spark_worker
    user: root
    restart: unless-stopped
    depends_on: [spark-master]
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      SPARK_NO_DAEMONIZE: "true"
      SPARK_WORKER_MEMORY: 2g
      SPARK_WORKER_CORES: 2
      CITIZEN_SECRET_SALT: ${CITIZEN_SECRET_SALT:-UADB_VOX_2025}
    volumes:
      - ./spark:/opt/spark-apps
      - ./models:/opt/models
      - ./data:/opt/data
    networks: [vox_sn_net]

  # ============================================================================
  # 7. HBASE — Stockage temps réel (alertes & posts)
  # ============================================================================
  hbase:
    image: harisekhon/hbase:2.1
    container_name: vox_hbase
    restart: unless-stopped
    hostname: hbase
    ports:
      - "16010:16010"
      - "9090:9090"
      - "2182:2181"
    environment:
      HBASE_CONF_hbase_master_info_port: "16010"
    volumes:
      - hbase_data:/hbase-data
    networks: [vox_sn_net]

  # ============================================================================
  # 8. HIVE METASTORE
  # ============================================================================
  hive-metastore:
    image: apache/hive:4.0.0
    container_name: vox_hive_metastore
    restart: unless-stopped
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: derby
    ports:
      - "9083:9083"
    volumes:
      - hive_data:/opt/hive/data/warehouse
    networks: [vox_sn_net]

  # ============================================================================
  # 9. HIVE SERVER 2 — Endpoint Beeline / JDBC
  # ============================================================================
  hive-server:
    image: apache/hive:4.0.0
    container_name: vox_hive_server
    hostname: hive-server
    restart: unless-stopped
    depends_on: [hive-metastore]
    environment:
      SERVICE_NAME: hiveserver2
      IS_RESUME: "true"
      SKIP_SCHEMA_INIT: "true"
      SERVICE_OPTS: >-
        -Dhive.metastore.uris=thrift://hive-metastore:9083
        -Dhive.server2.thrift.bind.host=0.0.0.0
        -Dhive.server2.thrift.port=10000
        -Dhive.execution.engine=mr
        -Dhive.server2.enable.doAs=false
        -Dhive.metastore.warehouse.dir=/opt/hive/data/warehouse
    ports:
      - "10000:10000"
      - "10002:10002"
    volumes:
      - hive_data:/opt/hive/data/warehouse
    networks: [vox_sn_net]

  # ============================================================================
  # 10. AIRFLOW — Orchestration MLOps
  # ============================================================================
  airflow:
    image: apache/airflow:2.7.3-python3.9
    container_name: vox_airflow
    restart: unless-stopped
    ports:
      - "8082:8080"
    environment:
      # SequentialExecutor requis avec SQLite (LocalExecutor exige PostgreSQL)
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      _AIRFLOW_DB_UPGRADE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_USER:-admin}
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_PWD:-admin}
    volumes:
      - ./dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./models:/opt/airflow/models
      - ./spark:/opt/airflow/spark
    networks: [vox_sn_net]
    command: standalone

  # ============================================================================
  # 11. MLFLOW — Tracking des expérimentations
  # ============================================================================
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.8.1
    container_name: vox_mlflow
    restart: unless-stopped
    ports:
      - "5001:5000"
    volumes:
      - mlflow_data:/mlflow
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
    networks: [vox_sn_net]

# ------------------------------------------------------------------------------
# Volumes persistants
# ------------------------------------------------------------------------------
volumes:
  zk_data:        {driver: local}
  zk_log:         {driver: local}
  kafka_data:     {driver: local}
  nifi_data:      {driver: local}
  hbase_data:     {driver: local}
  hive_data:      {driver: local}
  mlflow_data:    {driver: local}

# ------------------------------------------------------------------------------
# Réseau isolé
# ------------------------------------------------------------------------------
networks:
  vox_sn_net:
    driver: bridge
    name: vox_sn_net
